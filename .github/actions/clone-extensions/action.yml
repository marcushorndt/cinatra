name: Clone dev extensions
description: >-
  Clone the companion per-extension repos (cinatra-ai/<slug>) back into
  extensions/<scope>/<name> before pnpm install. The bundled extension source
  lives in the companion repos, not this tree, but the host
  build/typecheck and the IoC gates still need it on disk. Pure git/fs (no pnpm
  install, no DB/dev-app work) and fail-closed (errors if the manifest is empty
  or fewer dirs than declared materialize, so the gates can't pass vacuously).
  Assumes a prior actions/setup-node step (uses plain `node` + `git`); the
  companion repos are PUBLIC, so no token is required.
runs:
  using: composite
  steps:
    - name: Clone companion extension repos into extensions/
      shell: bash
      run: node scripts/ci/sync-dev-extensions.mjs
