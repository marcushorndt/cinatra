name: truthful-attribution-gate

# Thin caller for the org-reusable truthful-attribution-gate (cinatra-ai/ci),
# per the ratified spec cinatra-engineering#119 (re-scopes/supersedes #116).
#
# ENFORCE mode (spec §7 step 5): the gate computes presence + anti-fabrication
# findings (a truthful `Assisted-by`; a `Reviewed-by` that matches a real,
# non-self, non-stale PR approval at the reviewed head by a login whose repo
# permission meets the claimed tier; a `Gate-suite` that matches the committed
# `.github/gate-suite.json` and whose required contexts ran green; high-risk
# paths require the human arm at tier=maintainer) and FAILS the check on any
# error-severity finding. The WARN→ENFORCE flip is unblocked because the
# dedicated machine identity for agent-opened PRs is live (spec §5/§8.5,
# cinatra-engineering#137 CLOSED) — the bot authors agent PRs, @groganz approves,
# so `author != approver` holds mechanically and self-approval never deadlocks.
#
# Double-pinned: the reusable workflow is pinned to an immutable SHA AND carries
# the version comment (the moving ci marker re-pointed to this SHA) on the
# `uses:` line below, exactly like the other cinatra-ai/ci gate callers here.
#
# The named, versioned `.github/gate-suite.json` (required-check set + the
# Accountable engineer) lands in THIS same ENFORCE-bootstrap PR, carrying a
# human-arm tier=maintainer record (the gate cannot bless its own birth — it is
# a high-risk org-governance path). Enforce mode also requires live branch
# protection (strict "require branches up to date" + the required contexts) to
# match the committed suite; that is applied alongside this merge (spec §7
# step 3/5 bootstrap precondition).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  truthful-attribution-gate:
    uses: cinatra-ai/ci/.github/workflows/truthful-attribution-gate.yml@31570d9c772d24ae3f629d7e84483f53d4e10214 # v0.1.0
    with:
      mode: enforce
      ref: 31570d9c772d24ae3f629d7e84483f53d4e10214
