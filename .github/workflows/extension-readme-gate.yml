name: Extension README Gate

# Validates docs/developer/extension-readme.md contract against every in-scope
# extension under extensions/cinatra-ai/. Dedicated workflow (not a build-image.yml
# job) because build-image.yml's paths-ignore excludes **/*.md.

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**/README.md'
      - 'extensions/**/.readme-pending'
      - 'extensions/**/package.json'
      - 'scripts/audit/extension-readme-gate*.mjs'
      # Pinned clone-back inputs (the gate scans the cloned-back tree, so a
      # lock bump moves the README universe it validates):
      - 'cinatra-required-extensions.lock.json'
      - 'cinatra-dev-extensions.lock.json'
      # Clone-back implementation closure + the config that owns
      # cinatraDevExtensions (a clone-back change moves what materializes):
      - '.github/actions/clone-extensions/**'
      - 'scripts/ci/sync-dev-extensions.mjs'
      - 'packages/cli/src/cinatra-dev-extensions.mjs'
      - 'packages/cli/src/dev-repo-sync.mjs'
      - 'package.json'
      - 'scripts/audit/__tests__/**'
      - 'docs/developer/extension-readme.md'
      - '.github/workflows/extension-readme-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/**/README.md'
      - 'extensions/**/.readme-pending'
      - 'extensions/**/package.json'
      - 'scripts/audit/extension-readme-gate*.mjs'
      # Pinned clone-back inputs (the gate scans the cloned-back tree, so a
      # lock bump moves the README universe it validates):
      - 'cinatra-required-extensions.lock.json'
      - 'cinatra-dev-extensions.lock.json'
      # Clone-back implementation closure + the config that owns
      # cinatraDevExtensions (a clone-back change moves what materializes):
      - '.github/actions/clone-extensions/**'
      - 'scripts/ci/sync-dev-extensions.mjs'
      - 'packages/cli/src/cinatra-dev-extensions.mjs'
      - 'packages/cli/src/dev-repo-sync.mjs'
      - 'package.json'
      - 'scripts/audit/__tests__/**'
      - 'docs/developer/extension-readme.md'
      - '.github/workflows/extension-readme-gate.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Extension README gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Fetch PR base ref
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin \
            "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Clone companion extension repos
        uses: ./.github/actions/clone-extensions

      - name: Run gate
        env:
          CINATRA_README_GATE_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
        run: node scripts/audit/extension-readme-gate.mjs

  tests:
    name: Extension README gate — parser tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run parser tests
        run: pnpm exec vitest run scripts/audit/__tests__/extension-readme-gate.test.mjs
