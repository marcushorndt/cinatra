name: Twenty Bootstrap Proof

on:
  push:
    branches: [main]
    paths:
      - "scripts/twenty-bootstrap/**"
      - "docker-compose.yml"
      - "extensions/cinatra-ai/twenty-connector/**"
      - "extensions/cinatra-ai/crm-connector/**"
      - ".github/workflows/twenty-bootstrap-proof.yml"
  pull_request:
    paths:
      - "scripts/twenty-bootstrap/**"
      - "docker-compose.yml"
      - "extensions/cinatra-ai/twenty-connector/**"
      - "extensions/cinatra-ai/crm-connector/**"
      - ".github/workflows/twenty-bootstrap-proof.yml"

concurrency:
  group: twenty-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-proof:
    name: Twenty bootstrap proof
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TWENTY_TAG: v2.7.3
      CINATRA_CI: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Pull Twenty image (pinned)
        run: docker pull "twentycrm/twenty:${TWENTY_TAG}"

      - name: Bring up Twenty stack
        run: |
          docker compose --profile twenty up -d \
            twenty-db twenty-redis twenty-server twenty-worker

      - name: Wait for Twenty healthy
        run: bash scripts/twenty-bootstrap/wait-for-twenty-healthy.sh

      - name: Run bootstrap proof
        run: node scripts/twenty-bootstrap/twenty-bootstrap-proof.mjs

      - name: Snapshot drift check
        run: |
          git diff --exit-code scripts/twenty-bootstrap/twenty-mcp-tools.json || {
            echo ""
            echo "::error::Twenty MCP tools snapshot drifted. Re-run locally with UPDATE_SNAPSHOT=1, commit the new snapshot, and update the TWENTY_TAG pin."
            exit 1
          }

      - if: always()
        name: Twenty server logs (debug)
        run: docker compose --profile twenty logs --tail 200 twenty-server twenty-worker || true

      - if: always()
        name: Tear down Twenty stack
        run: docker compose --profile twenty down -v || true
