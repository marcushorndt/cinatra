# Viewer-scope spoofing-guard regression gate.
#
# Runs `scripts/audit/viewer-scope-gate.mjs` on every PR + push to main.
# Fails if any new production code derives `viewerScope` / `vendorScope`
# (the local-var name visibility filters consume) from the freely-editable
# `identity.instanceNamespace`. The canonical helper
# `getEffectiveViewerScope(identity)` in
# `src/lib/marketplace-credentials.ts` is the only sanctioned path.
#
# Companion to:
#   - `src/lib/__tests__/effective-viewer-scope.test.ts` (unit coverage)
#   - The 6-site migration that landed alongside the helper.

name: Viewer Scope Spoofing Guard

on:
  pull_request:
    # Draft PRs skip this gate; it runs on push-to-main and non-draft PRs
    # (ready_for_review re-runs it when a draft is marked ready).
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Run viewer-scope spoofing-guard regression gate
        run: node scripts/audit/viewer-scope-gate.mjs
