name: skills-drift-gate

# Thin caller for the reusable cinatra-ai/ci skills-drift-gate (cinatra#188).
#
# Flags when a cinatra change touches a surface an assistant-skills SKILL.md
# depends on — a declared `cinatra-watches` surface (MCP primitive / @cinatra-ai/*
# package / route / source-path glob) or, for skills without a watch block, a
# verbatim-identifier heuristic — so the impacted skill is reviewed before it
# silently goes stale.
#
# ENFORCE mode: the gate now FAILS on an UNACKNOWLEDGED declared-watch finding.
# Heuristic findings remain advisory (reported, never gating), so only a precise,
# skill-declared surface change can block a PR. Resolve a finding with ONE of:
#   - Skills-PR: <#n|url> covers: <skill-slug>[, ...]   (linked assistant-skills PR)
#   - Skills-reviewed: <note>
#   - Skills-unaffected: <reason>                        (reason REQUIRED)
#
# Required-check context: a reusable workflow_call does NOT create its own check
# context; the context is surfaced under THIS caller's JOB name, formatted
# "<caller-job> / <reusable-job>". The job below is named `skills-drift-gate`
# and the reusable job is `skills-drift-gate`, so the required status check is
# "skills-drift-gate / skills-drift-gate" — same convention as
# "source-leak-gate / source-leak-gate". Registered as a required check on main
# after the cinatra#188 enforce proof cycle.
#
# cinatra-ONLY: this gate is wired into this repo and nothing else. It is NOT
# part of the org-wide min-repo-config rollout (cinatra is the only repo whose
# changes can drift the assistant-skills knowledge).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # KEEP this job name stable as `skills-drift-gate` — it is the required-check
  # context prefix.
  skills-drift-gate:
    # Double-pin per the eng#61 convention: the workflow ref (@<sha>) and the
    # `ref` input below are pinned to the SAME cinatra-ai/ci commit (the v2 gate),
    # so the gate code is never pulled from mutable main.
    uses: cinatra-ai/ci/.github/workflows/skills-drift-gate.yml@7e6e94c95390c73a252a2cf40a643b5033f93ff0 # v0.1.0
    with:
      # assistant-skills pin: points at the commit that carries the skills'
      # `cinatra-watches` declarations. As of the closeout W5 skills-drift
      # reconciliation (cinatra-ai/engineering#244) this is back in STRICT
      # LOCKSTEP with the @cinatra-ai/assistant-skills resolvedSha in
      # cinatra-required-extensions.lock.json (both 538a817). The prior
      # watches-PR lead (skills_ref@2b65ef8 ahead of lock@2b65ef8, then
      # lock re-pinned to 538a817 by PR#424 without updating this pin) is
      # closed. The two intervening commits on assistant-skills are
      # docs-only (cat /skills/ mount guidance + chat-agent-authoring
      # instant-grant docs, the latter covered by the PR#382 Skills-PR
      # acknowledgement). Keep them in lockstep: at each
      # required-extensions lock refresh, re-pin this skills_ref to the
      # new assistant-skills resolvedSha now written into the lock.
      # Correction-for: PR#432 (malformed Reviewed-by — missing tier=maintainer).
      skills_ref: 538a8176f12a5e9dfe0c95f29b4b74cd711f7038
      mode: enforce
      ref: 6e417652524f6449db681034f2cb67e177adc6f6 # same SHA as the workflow @ref
