name: source-leak-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  source-leak-gate:
    uses: cinatra-ai/ci/.github/workflows/source-leak-gate.yml@83ca29ef8df0a33d11ba02568c61f2fdc56a3eaf # v0.1.1
    with:
      profile: ts-monorepo
      ratchet_mode: line
      # Exempts the repo-local actions-pinned-gate engine source + test by
      # basename: they necessarily contain the version-comment markers they
      # enforce (same exemption cinatra-ai/ci applies to its own copy).
      config: .github/source-leak-gate.config.json
      ref: 83ca29ef8df0a33d11ba02568c61f2fdc56a3eaf
