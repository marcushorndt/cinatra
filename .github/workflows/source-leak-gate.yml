name: source-leak-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  source-leak-gate:
    uses: cinatra-ai/ci/.github/workflows/source-leak-gate.yml@4c903fe9ca71ad47752a2bc92b72893e5f7c9814 # v0.1.0
    with:
      profile: ts-monorepo
      ratchet_mode: line
      # Exempts the repo-local actions-pinned-gate engine source + test by
      # basename: they necessarily contain the version-comment markers they
      # enforce (same exemption cinatra-ai/ci applies to its own copy).
      config: .github/source-leak-gate.config.json
      ref: 4c903fe9ca71ad47752a2bc92b72893e5f7c9814
