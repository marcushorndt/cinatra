name: secrets-required-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-required-gate:
    # In production pin BOTH to the same commit SHA: the workflow ref (`@<sha>`)
    # and the `ref` input below. Pinned here to the cinatra-ai/ci main that
    # introduces this gate; the prerelease comment marks it (engineering#315).
    # Re-pin to the ci release SHA + tag once that PR merges and ci is released.
    uses: cinatra-ai/ci/.github/workflows/secrets-required-gate.yml@83ca29ef8df0a33d11ba02568c61f2fdc56a3eaf # v0.1.0-next.83ca29
    with:
      ref: 83ca29ef8df0a33d11ba02568c61f2fdc56a3eaf
