    # introduces this gate; the prerelease comment marks it (engineering#315).
    # Re-pin to the ci release SHA + tag once that PR merges and ci is released.
    uses: cinatra-ai/ci/.github/workflows/secrets-required-gate.yml@d35ff0226591470444ad4c8a1eb7045911c88794 # v0.1.0-next.d35ff02
    with:
      ref: d35ff0226591470444ad4c8a1eb7045911c88794
