# WordPress/Drupal full-rename gate — thin caller.
#
# The scan logic (old widget-identity token pattern + rg invocation) lives in
# cinatra-ai/ci as a reusable workflow shared by every repo that carries the
# renamed plugin/module identity. This caller only decides WHEN it runs on
# this repo: push-to-main and non-draft PRs (ready_for_review re-runs it when
# a draft is marked ready). The scan respects .gitignore, so the gitignored
# companion clone paths (dev/wordpress-plugin/, dev/drupal-module/cinatra/)
# are skipped — see the allowlist notes in the reusable workflow.

name: WP/Drupal Rename Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rename-gate:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    uses: cinatra-ai/ci/.github/workflows/wp-drupal-rename-gate.yml@83ca29ef8df0a33d11ba02568c61f2fdc56a3eaf # v1.0.0-next.4c903fe
