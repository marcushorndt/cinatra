# Gatekept-install bypass-prevention gate.
#
# Runs `scripts/audit/gatekept-install-no-direct-registry.mjs` on every PR +
# push to main. Fails if any install/detail module constructs a registry URL
# or registry auth token directly instead of going through the sanctioned
# grant/proxy + config-loader seams (see the script's ALLOWLIST). Fail-closed:
# an unreadable/missing target is a hard failure, not a silent pass.

name: Gatekept Install No Direct Registry

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Run gatekept-install bypass-prevention gate
        run: node scripts/audit/gatekept-install-no-direct-registry.mjs
      - name: Run gate unit tests
        run: node --test scripts/audit/__tests__/gatekept-install-no-direct-registry.test.mjs
