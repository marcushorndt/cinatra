name: knip-report

# REPORT-ONLY dead-code / unused-dependency reporter (closeout W2, eng#73).
#
# Runs `knip` (config: knip.json) and surfaces unused files / exports /
# dependencies as a job summary. It is DELIBERATELY NON-BLOCKING: the knip step
# uses `--no-exit-code`, so a finding never fails the build. This is the agreed
# ratchet policy for this milestone — REPORT-ONLY now, with the option to flip
# to a gating ratchet (knip exit-on-findings + a baseline of tolerated misses,
# mirroring scripts/audit/*.baseline.json) in a later milestone.
#
# Why it still clones the companion extension tree + installs frozen: knip
# resolves the pnpm workspace graph, and a fresh clone without the source-mirror
# extension packages fails `pnpm install` resolution outright
# (ERR_PNPM_WORKSPACE_PKG_NOT_FOUND). The clone-extensions action runs
# `scripts/ci/sync-dev-extensions.mjs --pinned` so the universe matches the
# committed lockfile. `extensions/**` is ignored by knip.json itself (the trees
# are loaded dynamically via manifest serverEntry / generated registries, not
# statically analyzable, and are never edited from this repo).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  knip-report:
    name: knip dead-code report (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Clone companion extension repos
        uses: ./.github/actions/clone-extensions

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate Next's route types so knip resolves the App Router entry graph
      # the same way the typecheck job does (.next/types/*).
      - name: Generate route types (next typegen)
        run: pnpm exec next typegen

      # `--no-exit-code` keeps this report-only: findings are surfaced, never gated.
      - name: knip (report-only)
        run: pnpm exec knip --no-exit-code --reporter markdown | tee "$GITHUB_STEP_SUMMARY"
