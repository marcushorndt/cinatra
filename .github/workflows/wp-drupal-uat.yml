# WordPress/Drupal assistant Playwright UAT gate.
#
# The UAT RUN LOGIC (composite action) lives in cinatra-ai/ci
# (.github/actions/wp-drupal-uat-run) — shared CI plumbing that operates on a
# cinatra core checkout. This caller stays in THIS repo because its subject is
# core PRs: the path filter below targets core integration paths and the
# Playwright suite itself lives in tests/e2e/wp-drupal-uat/. The canonical
# wire contract lives in cinatra-ai/wordpress-assistant-connector
# (contracts/wp-drupal-assistant/).
#
# - Path-filtered HARD gate on PRs: when plugin-integration paths are
#   touched, the full UAT suite must pass; otherwise the gate passes quickly.
#   The `uat-gate` job ALWAYS runs so it is a stable required status check.
# - Nightly cron runs the full suite regardless of touched paths.
# - The `override-wp-drupal-uat` label skips the hard run (planned migrations);
#   it additionally requires both owners' review + an auditable PR-body rationale
#   (enforced by review process / CONTRIBUTING; recorded here in the job log).
#
# RUNNER REQUIREMENT: the full UAT needs Docker (WP/Drupal + app services) plus
# the app-service env (SUPABASE_DB_URL, BETTER_AUTH_SECRET, REDIS_URL, …). Set
# the `WP_DRUPAL_UAT_RUNNER` repo variable to a provisioned (self-hosted) runner
# label if ubuntu-latest cannot host the stack — whether ubuntu-latest suffices
# is answered empirically by the next contract-path run / 07:00Z nightly.
# CREDENTIALS: the companion devApp repos (wordpress-plugin, drupal-module,
# a2a-servers-dev) are PUBLIC — `cinatra setup dev` clones them anonymously over
# HTTPS, so no deploy key is required. The secret WP_DRUPAL_UAT_DEPLOY_KEY is
# OPTIONAL and forwarded when present (future private repos); the shared action
# skips its SSH-config step entirely when the key is empty.

name: WP/Drupal UAT Gate

on:
  pull_request:
    # Draft PRs skip the real UAT (green-stub via run_real); ready_for_review runs
    # it for real; converted_to_draft lets concurrency cancel an in-flight run.
    # labeled/unlabeled re-evaluate the gate when `override-wp-drupal-uat` is
    # toggled (otherwise removing the label could leave a stale-green check).
    types:
      [
        opened,
        synchronize,
        reopened,
        ready_for_review,
        converted_to_draft,
        labeled,
        unlabeled,
      ]
  schedule:
    - cron: "0 7 * * *" # nightly full suite (07:00 UTC)
  workflow_dispatch: # on-demand proof of the nightly full-suite path (cinatra#173)

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter queries the PR's changed files via the API

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changed-paths:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
      contract_schema: ${{ steps.filter.outputs.contract_schema }}
      # run_real = run the real UAT: relevant paths touched AND not a draft PR.
      # (changed-paths only runs on pull_request, so draft is defined here.)
      run_real: ${{ steps.filter.outputs.relevant == 'true' && github.event.pull_request.draft != true }}
      # run_uat = run_real AND the override label is NOT present. Single source of
      # truth for "Postgres/Redis + secret + composite action all activate" on the
      # uat-gate job — drives the conditional service images AND every real-run
      # step `if:` so the services condition can never drift from the step
      # conditions. (changed-paths is pull_request-only, so the labels read here
      # is always defined.)
      run_uat: ${{ steps.filter.outputs.relevant == 'true' && github.event.pull_request.draft != true && !contains(github.event.pull_request.labels.*.name, 'override-wp-drupal-uat') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            contract_schema:
              - 'src/lib/wp-drupal-auth-init.schema.json'
            relevant:
              - 'src/lib/wp-drupal-contract.ts'
              - 'src/lib/wp-drupal-auth-init.schema.json'
              - 'src/app/api/wordpress/**'
              - 'src/app/api/drupal/**'
              - 'src/lib/wordpress-mcp-connection.ts'
              - 'src/lib/dev-auto-setup.ts'
              - 'packages/llm/src/scripted-test-provider.ts'
              - 'tests/e2e/wp-drupal-uat/**'
              - 'tests/e2e/config/wp-drupal-uat.config.ts'
              - 'tests/e2e/config/base.ts'
              - 'dev/wordpress-plugin/**'
              - 'dev/drupal-module/**'

  # Reciprocal contract lock-step gate (canonical-first ordering): a core PR
  # that edits the ENFORCED auth-init schema copy must match the CANONICAL
  # schema already on the contract repo's default branch
  # (cinatra-ai/wordpress-assistant-connector, contracts/wp-drupal-assistant/).
  # The contract repo's own gate covers the other direction plus a weekly
  # drift schedule. Cheap (two checkouts + a deep-compare), so it runs on
  # drafts too.
  contract-schema-lockstep:
    if: github.event_name == 'pull_request' && needs.changed-paths.outputs.contract_schema == 'true'
    needs: changed-paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Checkout the canonical contract repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: cinatra-ai/wordpress-assistant-connector
          path: .wp-drupal-contract
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Enforced copy matches the canonical v1 auth-init schema
        run: |
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            import assert from 'node:assert/strict';
            const canonical = JSON.parse(readFileSync('.wp-drupal-contract/contracts/wp-drupal-assistant/v1/auth-init.schema.json', 'utf8'));
            const enforced = JSON.parse(readFileSync('src/lib/wp-drupal-auth-init.schema.json', 'utf8'));
            assert.deepEqual(
              enforced,
              canonical,
              'src/lib/wp-drupal-auth-init.schema.json does not match the canonical v1 auth-init schema on the contract repo default branch — land the canonical change first (canonical-first ordering), then update the enforced copy here.',
            );
            console.log('OK: enforced copy matches the canonical v1 auth-init schema.');
          "

  # Stable required status check — always runs on PRs, branches internally.
  # `!cancelled()` keeps it running (and failing loud below) when changed-paths
  # itself fails — a skipped required check would otherwise satisfy protection.
  uat-gate:
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    needs: changed-paths
    runs-on: ${{ vars.WP_DRUPAL_UAT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 40
    # Conditional service containers (the dashboard-live-verify idiom): an empty
    # `image` string means the service is NOT started. `services:` containers
    # spin up for the WHOLE job regardless of step `if:`, so gating the image on
    # the single authoritative `run_uat` output keeps the fast-pass / draft /
    # override-labeled paths container-free and trivially fast-green as a
    # required check, while the real-run path gets a live Postgres + Redis.
    services:
      postgres:
        # postgres:17-alpine matches docker-compose.yml's Postgres major so CI
        # exercises the same engine `cinatra setup dev` provisions against.
        image: ${{ needs.changed-paths.outputs.run_uat == 'true' && 'postgres:17-alpine' || '' }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: ${{ needs.changed-paths.outputs.run_uat == 'true' && 'redis:7-alpine' || '' }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # In-repo, zero-secret app-service env mirroring dashboard-live-verify.yml.
      # The connection string is the same literal the CLI's own rebuildEnvLocal()
      # writes; the Postgres service publishes 5434 above. Job-level env is
      # inherited by every step INCLUDING the composite action's steps, so
      # `cinatra setup dev` (run inside the composite action) finds SUPABASE_DB_URL
      # and a live DB. (cinatra#173)
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:5434/postgres
      REDIS_URL: redis://127.0.0.1:6379
      # scripted-test-provider.ts fail-CLOSES unless this is exactly 'development'
      # (and NODE_ENV != production); `setup dev` also asserts the configured
      # runtime mode equals development. Do NOT set NODE_ENV=production here.
      CINATRA_RUNTIME_MODE: development
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      # next.config.ts REQUIRED_ENV asserts presence of OPENAI_API_KEY at
      # dev-server startup (next.config.ts:6-13). The UAT boots `pnpm dev` with
      # the deterministic SCRIPTED provider (no real OpenAI call), but the
      # presence check still fires — so a zero-secret placeholder is required
      # (mirrors dashboard-live-verify.yml and the Dockerfile placeholder).
      OPENAI_API_KEY: ci-placeholder-not-used-by-wp-drupal-uat
    steps:
      - name: Fail loud if changed-paths did not succeed
        if: needs.changed-paths.result != 'success'
        run: |
          echo "::error::changed-paths result: ${{ needs.changed-paths.result }} — path relevance unknown, failing the gate instead of skipping."
          exit 1
      - name: Override label present → skip with audit note
        if: contains(github.event.pull_request.labels.*.name, 'override-wp-drupal-uat')
        run: |
          echo "::notice::override-wp-drupal-uat label present — UAT hard gate skipped."
          echo "Requires both owners' review + a PR-body rationale (what breaks, follow-up PRs, rollback). See docs/developer/contributing.md."
      - name: No contract paths touched (or draft/override) → gate passes quickly
        if: needs.changed-paths.outputs.run_uat != 'true'
        run: echo "No WP/Drupal contract paths touched, or draft/override-labeled PR — UAT not applicable (real UAT runs on ready non-draft PRs touching contract paths, and nightly)."
      - name: Checkout
        if: needs.changed-paths.outputs.run_uat == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Derive BETTER_AUTH_SECRET (throwaway, per-run)
        if: needs.changed-paths.outputs.run_uat == 'true'
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Assert app-service env present (regression pin for cinatra#173)
        if: needs.changed-paths.outputs.run_uat == 'true'
        # Env-presence guard ONLY (runs in the caller, BEFORE the composite
        # action installs `pg`). Postgres reachability is already guaranteed by
        # the services.postgres healthcheck (steps don't start until it passes).
        run: |
          : "${SUPABASE_DB_URL:?cinatra#173 regression: SUPABASE_DB_URL must be exported (postgres service + job env) before cinatra setup dev}"
          : "${BETTER_AUTH_SECRET:?cinatra#173 regression: BETTER_AUTH_SECRET must be derived (openssl rand) before cinatra setup dev}"
          : "${OPENAI_API_KEY:?cinatra#173 regression: OPENAI_API_KEY placeholder must be set (next.config.ts REQUIRED_ENV) before the dev server boots}"
          : "${CINATRA_RUNTIME_MODE:?cinatra#173 regression: CINATRA_RUNTIME_MODE=development required (scripted provider fail-closes otherwise)}"
          echo "app-service env present"
      - name: Run full UAT suite
        if: needs.changed-paths.outputs.run_uat == 'true'
        uses: cinatra-ai/ci/.github/actions/wp-drupal-uat-run@7e6e94c95390c73a252a2cf40a643b5033f93ff0 # v0.1.0
        with:
          # OPTIONAL — devApp repos are public (anonymous HTTPS clone). Forwarded
          # when configured so a future private flip keeps working unchanged.
          deploy-key: ${{ secrets.WP_DRUPAL_UAT_DEPLOY_KEY }}

  nightly:
    # schedule = the 07:00Z nightly; workflow_dispatch = on-demand proof of the
    # full-suite path (cinatra#173). The full suite runs regardless of paths.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.WP_DRUPAL_UAT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 50
    services:
      postgres:
        # postgres:17-alpine matches docker-compose.yml's Postgres major so CI
        # exercises the same engine `cinatra setup dev` provisions against.
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # In-repo, zero-secret app-service env mirroring dashboard-live-verify.yml
      # (and the uat-gate job above). Job-level env reaches the composite
      # action's steps, so `cinatra setup dev` finds SUPABASE_DB_URL + a live DB
      # on ubuntu-latest. (cinatra#173)
      SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:5434/postgres
      REDIS_URL: redis://127.0.0.1:6379
      # scripted-test-provider.ts fail-CLOSES unless this is exactly 'development'
      # (and NODE_ENV != production); `setup dev` also asserts development.
      CINATRA_RUNTIME_MODE: development
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      # Presence-only — next.config.ts REQUIRED_ENV asserts it at dev-server
      # startup; the UAT uses the deterministic scripted provider, never a real
      # OpenAI call. Zero-secret placeholder (mirrors dashboard-live-verify.yml).
      OPENAI_API_KEY: ci-placeholder-not-used-by-wp-drupal-uat
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Derive BETTER_AUTH_SECRET (throwaway, per-run)
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Assert app-service env present (regression pin for cinatra#173)
        # Env-presence guard ONLY (runs in the caller, BEFORE the composite
        # action installs `pg`). Postgres reachability is already guaranteed by
        # the services.postgres healthcheck (steps don't start until it passes).
        run: |
          : "${SUPABASE_DB_URL:?cinatra#173 regression: SUPABASE_DB_URL must be exported (postgres service + job env) before cinatra setup dev}"
          : "${BETTER_AUTH_SECRET:?cinatra#173 regression: BETTER_AUTH_SECRET must be derived (openssl rand) before cinatra setup dev}"
          : "${OPENAI_API_KEY:?cinatra#173 regression: OPENAI_API_KEY placeholder must be set (next.config.ts REQUIRED_ENV) before the dev server boots}"
          : "${CINATRA_RUNTIME_MODE:?cinatra#173 regression: CINATRA_RUNTIME_MODE=development required (scripted provider fail-closes otherwise)}"
          echo "app-service env present"
      - name: Run full UAT suite
        uses: cinatra-ai/ci/.github/actions/wp-drupal-uat-run@7e6e94c95390c73a252a2cf40a643b5033f93ff0 # v0.1.0
        with:
          # OPTIONAL — devApp repos are public (anonymous HTTPS clone). Forwarded
          # when configured so a future private flip keeps working unchanged.
          deploy-key: ${{ secrets.WP_DRUPAL_UAT_DEPLOY_KEY }}
