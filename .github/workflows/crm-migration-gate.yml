name: CRM Migration Gate

# Guards the Twenty CRM migration's retirement of the legacy CRM surfaces.
# Dedicated workflow (not a build-image.yml job) so it can run on OAS-only /
# script-only changes that build-image.yml's paths-ignore would skip, and to
# keep the densely phase-annotated build-image.yml untouched.
#
# Two gates:
#   - crm-pointer-gate (--strict): no retired accounts_*/contacts_*/lists_* MCP
#     primitives, no heavy-field reads off cinatra.objects for CRM types, and no
#     legacy entity typeHints outside the allowlisted facade/stub/substrate
#     surfaces. CRM records live in Twenty; cinatra holds only pointer rows.
#   - oas-banned-primitives-gate: the crm-pointer-gate skips /cinatra/oas.json,
#     so this companion scans the LLM-visible OAS prompt strings of every
#     extensions/**/cinatra/oas.json for the same retired surfaces.

on:
  # No `paths:` filter on either trigger. The `CRM migration gates` job is a
  # branch-protection required-status-check on `main` — if the workflow
  # didn't run (because a docs-only PR's paths fell outside a filter), the
  # required check would stay Pending and block the merge. So this workflow
  # always runs on every push to `main` and every PR to `main`. The gate
  # scripts are fast (a few Node-only static scans + one vitest file).
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: CRM migration gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Clone companion extension repos
        uses: ./.github/actions/clone-extensions

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: CRM pointer-row gate (strict)
        run: node scripts/audit/crm-pointer-gate.mjs --strict

      - name: OAS banned-primitives gate
        run: node scripts/audit/oas-banned-primitives-gate.mjs

      - name: OAS banned-primitives gate tests
        run: pnpm exec vitest run scripts/audit/__tests__/oas-banned-primitives-gate.test.mjs

      - name: CRM pointer-row gate tests
        run: node --test scripts/audit/__tests__/crm-pointer-gate.test.mjs
