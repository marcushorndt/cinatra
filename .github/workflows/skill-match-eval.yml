name: Skill-Match Live Eval

# Gated live calibration run for the LLM skill matcher.
#
# Runs on PRs that touch the matcher prompt, the evaluator core, or any
# constants that materially affect classifier output. The actual eval is
# `packages/skills/src/llm-matching/__tests__/golden-eval.live.test.ts`,
# which asserts accuracy ≥ 0.85 + Spearman ρ ≥ 0.7 against the 20-row
# golden fixture by calling the real OpenAI API.
#
# Gating model:
#   - `paths` filter ensures the workflow only fires on matcher-relevant
#     changes (saves quota on cosmetic PRs).
#   - The `live-eval` job itself is gated on the `OPENAI_API_KEY` secret
#     via an `if:` condition. Forks and PRs from contributors without the
#     secret skip cleanly without a red failure.
#   - The double-gate in the test file (OPENAI_API_KEY + GOLDEN_EVAL_LIVE=1)
#     guards against accidentally calling OpenAI from the regular unit run
#     elsewhere in CI.

on:
  pull_request:
    branches: [main]
    paths:
      # Cover the full transitive matcher path that affects classifier
      # output, not just the most-obvious entry points. Anything the live
      # eval transitively imports OR the fixture itself qualifies.
      - 'packages/skills/src/llm-matching/prompt.md'
      - 'packages/skills/src/llm-matching/prompt-builder.ts'
      - 'packages/skills/src/llm-matching/evaluate-pair.ts'
      - 'packages/skills/src/llm-matching/constants.ts'
      - 'packages/skills/src/llm-matching/rationale-grounding.ts'
      - 'packages/skills/src/llm-matching/response-parser.ts'
      - 'packages/skills/src/llm-matching/rule-short-circuit.ts'
      - 'packages/skills/src/llm-matching/match-when-parser.ts'
      - 'packages/skills/src/llm-matching/eval-calibration.ts'
      - 'packages/skills/src/llm-matching/__tests__/golden-eval.live.test.ts'
      - 'packages/skills/src/llm-matching/__tests__/__fixtures__/golden-matches.jsonl'
      - 'packages/skills/src/llm-matching/__tests__/__fixtures__/golden-fixture-schema.ts'
      # Self-validation: this workflow + its docs should retrigger so the
      # gating logic is itself exercised on PRs that change it.
      - '.github/workflows/skill-match-eval.yml'
      - 'docs/developer/skill-matching.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One run per branch — cancel earlier runs on push to save quota.
  group: skill-match-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-eval:
    name: Live OpenAI golden-set calibration
    runs-on: ubuntu-latest

    # Skip cleanly when the secret isn't available (forks, PRs from
    # contributors without write access, repo without the secret
    # configured). This makes the workflow non-blocking for those PRs;
    # required-status-check on this workflow should be configured as
    # "successful, neutral, or skipped" rather than "successful only".
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check OPENAI_API_KEY availability
        id: check_key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY secret is present — live eval will run."
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY secret is NOT set. Skipping live eval; ensure the matcher prompt + evaluator core are still typecheck-clean via the main unit-tests workflow."
          fi

      - name: Set up pnpm
        if: steps.check_key.outputs.has_key == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        if: steps.check_key.outputs.has_key == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.check_key.outputs.has_key == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run live golden-set calibration
        if: steps.check_key.outputs.has_key == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOLDEN_EVAL_LIVE: '1'
        working-directory: packages/skills
        # Double-gate enforced inside the test:
        #   - describe.skipIf(!OPENAI_API_KEY || !GOLDEN_EVAL_LIVE) — both
        #     must be present, OR the suite skips.
        #   - vitest.config.ts skips its @cinatra-ai/llm stub
        #     only when GOLDEN_EVAL_LIVE=1.
        # Without both, the "live" run silently calls the test stub.
        run: pnpm exec vitest run src/llm-matching/__tests__/golden-eval.live.test.ts

      - name: Note skipped run
        if: steps.check_key.outputs.has_key != 'true'
        run: |
          echo "::notice title=Live eval skipped::OPENAI_API_KEY secret not configured. The live golden-set calibration was NOT run for this PR. To enable, set the OPENAI_API_KEY secret in the repository settings."
