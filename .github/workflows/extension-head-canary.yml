# Floating-HEAD canary for the companion extension repos (cinatra#141).
#
# Merge-gating CI clones the extension universe PINNED to the committed lock
# shas (cinatra-required-extensions.lock.json + cinatra-dev-extensions.lock.json),
# so companion-repo drift can no longer turn host `main` red with zero host
# commits. This workflow is the deliberate counterweight: it tracks the
# companion repos' branch TIPS on a schedule and surfaces upcoming breakage
# EARLY — a red run here means "land a dev-lock bump PR soon"
# (docs/extension-clone-pinning.md), never "main is broken".
#
# NON-GATING BY DESIGN: not a required status check, runs on a schedule (plus
# manual dispatch) against the default branch — it must never block a merge.
# Signal set (cheapest first, all zero-host-commit breakage classes):
#   1. HEAD-vs-pin divergence report (annotation-only context for any failure
#      below — and the bump-cadence signal even when everything still passes);
#   2. agent-definition validation at tips (pre-install, like validate-agents);
#   3. extension README gate at tips (pre-install);
#   4. `pnpm install --frozen-lockfile` at tips — the #138 incident class
#      (companion manifest drift vs the committed pnpm-lock.yaml);
#   5. generated-maps `--check` at tips — loader/catalog drift vs the
#      committed presence-aware maps.
name: extension-head-canary

on:
  schedule:
    # Daily, offset from the busy on-the-hour windows.
    - cron: '23 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extension-head-canary
  cancel-in-progress: true

jobs:
  head-canary:
    name: Floating-HEAD canary (non-gating)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      # The ONE sanctioned head-mode consumer in CI: this canary exists to
      # watch tips. Every merge-gating job uses the default pinned mode.
      - name: Clone companion extension repos at branch HEAD
        uses: ./.github/actions/clone-extensions
        with:
          mode: head

      # Report-only (exit 0): the per-repo ::warning annotations tell a reader
      # WHICH companions moved past the pins, so a failure in any later step
      # maps straight to the repos that need a bump.
      - name: HEAD-vs-pin divergence report
        run: node scripts/ci/extension-pin-divergence-report.mjs

      - name: Validate agent definitions at tips
        run: node scripts/ci-validate-agents.mjs

      - name: Extension README gate at tips
        run: node scripts/audit/extension-readme-gate.mjs

      - name: Frozen install at tips (the lockfile-drift incident class)
        run: pnpm install --frozen-lockfile

      - name: Generated-maps drift check at tips
        run: node scripts/extensions/generate-extension-manifest.mjs --check
