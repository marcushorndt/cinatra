name: secret-scan-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan-gate:
    uses: cinatra-ai/ci/.github/workflows/secret-scan-gate.yml@a8677e50ba02fcb11929e94c70fb5ba96a8ea3ae # v0.1.0
    with:
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}
