# Admin-namespace route reference regression guard.
#
# Runs `scripts/audit/administration-route-banned.mjs` on every PR + push to
# main. Fails if any source file outside the allowlist (the next.config.ts
# redirect rule and src/lib/wordpress-api.ts external endpoint) references the
# historical admin route prefix as a Cinatra route.
#
# The canonical admin paths are `/configuration/...` (UI) and `/api/admin/...` (API).
# A permanent 308 redirect in next.config.ts preserves external bookmarks
# under the historical prefix; this gate prevents new internal callers from
# being added that route through the redirect.
#
# A dedicated workflow is used (rather than only the build-image.yml job)
# because docs-only changes are paths-ignored in build-image.yml — a docs-
# only regression would otherwise skip the gate.

name: Administration Route Banned

on:
  pull_request:
    # Draft PRs skip this gate; it runs on push-to-main and non-draft PRs
    # (ready_for_review re-runs it when a draft is marked ready).
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  administration-route-banned:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the touch-ratchet diff against the PR base
          # works for PRs on long-running branches.
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Compute diff base
        id: base
        # PRs → origin/<pr.base.ref>. Pushes → previous-tip
        # (github.event.before) so a push to main still has a meaningful
        # touch-ratchet anchor (otherwise the three-dot diff is empty).
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            base="origin/${{ github.event.pull_request.base.ref }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base="${{ github.event.before }}"
          else
            base="origin/main"
          fi
          # Validate the base resolves to a commit. When it points at a commit
          # not present in the fetched history, the three-dot diff has no shared
          # anchor and every pre-existing reference is misread as newly added.
          # Fall back to HEAD so the gate self-compares: HEAD vs HEAD is an empty
          # diff, so no line is seen as added and the absolute baseline check
          # holds. An empty base is deliberately NOT used — the gate treats "" as
          # absent and re-resolves origin/main, diffing against pre-existing
          # legacy references and failing. If HEAD itself cannot resolve (should
          # never happen in a real checkout), hard-fail rather than drop the guard.
          if [ -n "$base" ] && ! git rev-parse --verify --quiet "${base}^{commit}" >/dev/null 2>&1; then
            head="$(git rev-parse --verify --quiet HEAD || true)"
            if [ -z "$head" ]; then
              echo "::error::diff base '${base}' did not resolve AND HEAD did not resolve — cannot anchor the ratchet gate; failing rather than dropping the guard."
              exit 1
            fi
            echo "::notice::diff base '${base}' did not resolve — using HEAD so the ratchet gate self-compares"
            base="$head"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
      - name: Run administration-route banned gate
        env:
          ADMIN_ROUTE_DIFF_BASE: ${{ steps.base.outputs.base }}
        run: node scripts/audit/administration-route-banned.mjs
