name: SDK ABI Doc Gate

# Pins the @cinatra-ai/sdk-extensions author-facing ABI version so the docs can
# never drift from the code (cinatra-engineering#152). Asserts the ABI version
# is byte-equal across the three places it lives:
#   - packages/sdk-extensions/src/register.ts  (SDK_EXTENSIONS_ABI_VERSION)
#   - packages/sdk-extensions/package.json      (cinatra.sdkAbiVersion)
#   - packages/sdk-extensions/README.md         ("The SDK ABI is **`X`**")
#
# Also hosts the SDK PUBLIC-SURFACE FENCE (SDK-P2): the public author root
# (src/index.ts) must re-export NO host service-bus capability-id constant as a
# value — those stay behind the host-only ./internal subpath. Wired here (not
# build-image.yml) because both gates run pure Node on committed files with NO
# pnpm install. (The runtime reachability twin lives in the package's vitest
# suite, run by build-image.yml's `packages/sdk-extensions/src` step.)
#
# Dedicated workflow (not a build-image.yml job) because build-image.yml's
# paths-ignore excludes **/*.md, and the README is half the ABI contract here.

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk-extensions/README.md'
      - 'packages/sdk-extensions/package.json'
      - 'packages/sdk-extensions/src/register.ts'
      - 'packages/sdk-extensions/src/index.ts'
      - 'packages/sdk-extensions/src/internal.ts'
      - 'scripts/audit/sdk-abi-readme-gate.mjs'
      - 'scripts/audit/sdk-public-surface-ban.mjs'
      - 'scripts/audit/__tests__/sdk-abi-readme-gate.test.mjs'
      - 'scripts/audit/__tests__/sdk-public-surface-ban.test.mjs'
      - '.github/workflows/sdk-abi-doc-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/sdk-extensions/README.md'
      - 'packages/sdk-extensions/package.json'
      - 'packages/sdk-extensions/src/register.ts'
      - 'packages/sdk-extensions/src/index.ts'
      - 'packages/sdk-extensions/src/internal.ts'
      - 'scripts/audit/sdk-abi-readme-gate.mjs'
      - 'scripts/audit/sdk-public-surface-ban.mjs'
      - 'scripts/audit/__tests__/sdk-abi-readme-gate.test.mjs'
      - 'scripts/audit/__tests__/sdk-public-surface-ban.test.mjs'
      - '.github/workflows/sdk-abi-doc-gate.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: SDK ABI doc gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run gate
        run: node scripts/audit/sdk-abi-readme-gate.mjs

      - name: Run SDK public-surface fence (no host capability-id leak on root)
        run: node scripts/audit/sdk-public-surface-ban.mjs

  tests:
    name: SDK ABI doc gate — extractor tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run tests
        run: node --test scripts/audit/__tests__/sdk-abi-readme-gate.test.mjs

      - name: Run public-surface-ban extractor tests
        run: node --test scripts/audit/__tests__/sdk-public-surface-ban.test.mjs
