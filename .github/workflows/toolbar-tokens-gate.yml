name: Toolbar Design-System Gate

# Enforces design-system.html §Toolbar / §Nested toolbar (cinatra#54) via
# scripts/audit/toolbar-tokens.mjs:
#   1. toolbar ground tokens pinned to the spec values in both token homes
#      (src/app/globals.css + packages/design/src/tokens.css);
#   2. no non-canonical `role="toolbar"` JSX outside the canonical
#      src/components/ui/toolbar.tsx (allowlist mechanism for third-party
#      DOM that cannot mount <Toolbar>);
#   3. no spec ground hexes hardcoded outside the token files.
#
# Deliberately NOT paths-scoped (unlike gantt-css-tokens-gate): check 2 must
# see every PR — a hand-rolled toolbar can land in any .tsx file. The gate
# is a single sub-second node script, so running it unconditionally is
# cheaper than the paths-filter bookkeeping it would take to skip it.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger — lets maintainers re-run the gate without an empty commit
  # when an upstream webhook is lost or after a tooling change.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Toolbar design-system gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run gate
        run: node scripts/audit/toolbar-tokens.mjs

  tests:
    name: Toolbar design-system gate — parser tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run parser tests
        run: pnpm exec vitest run scripts/audit/__tests__/toolbar-tokens.test.mjs
