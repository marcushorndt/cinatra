name: Gantt CSS Token-Drift Gate

# Lints src/components/workflows/gantt-overrides.css for raw colors outside
# the semantic-token allowlist (see scripts/audit/gantt-css-tokens.mjs — the
# SVAR Gantt embed's documented token-conformance rule).
#
# Dedicated workflow (not a build-image.yml job) for two reasons:
#   1. A gate step tail-appended to an already-red job is silently skipped
#      by GitHub Actions' default `if: success()`. Top-level jobs always run.
#   2. The override file changes infrequently; paths-triggering this gate
#      avoids burning CI minutes on unrelated PRs.

on:
  push:
    branches: [main]
    paths:
      - 'src/components/workflows/gantt-overrides.css'
      - 'scripts/audit/gantt-css-tokens.mjs'
      - 'scripts/audit/__tests__/gantt-css-tokens.test.mjs'
      - '.github/workflows/gantt-css-tokens-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/components/workflows/gantt-overrides.css'
      - 'scripts/audit/gantt-css-tokens.mjs'
      - 'scripts/audit/__tests__/gantt-css-tokens.test.mjs'
      - '.github/workflows/gantt-css-tokens-gate.yml'
  # Manual trigger — lets maintainers re-run the gate without an empty commit
  # when an upstream webhook is lost or after a tooling change.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gantt CSS token-drift gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run gate
        run: node scripts/audit/gantt-css-tokens.mjs

  tests:
    name: Gantt CSS token-drift gate — parser tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run parser tests
        run: pnpm exec vitest run scripts/audit/__tests__/gantt-css-tokens.test.mjs
